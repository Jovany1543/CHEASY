ports:
  - port: 3000
    onOpen: open-browser
    visibility: public
  - port: 3001
    onOpen: open-preview
    visibility: public

tasks:
  - name: Install dependencies
    init: |
      cd backend
      python -m pip install --user pipenv
      python -m pipenv sync
      cd ../frontend
      npm install
  - name: Backend
    command: |
      cd backend
      python -m pipenv run python app.py
  - name: Frontend
    command: |
      cd frontend
      npm start
    openMode: split-right

vscode:
  extensions:
    - ms-python.python
    - ms-python.vscode-pylance
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode