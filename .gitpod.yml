ports:
  - port: 3000
    onOpen: open-browser
    visibility: public
  - port: 3001
    onOpen: open-browser
    visibility: public

tasks:
  - name: Install dependencies
    init: |
      export PATH="$HOME/.local/bin:$PATH"
      cd backend
      if ! command -v pipenv >/dev/null 2>&1; then python -m pip install --user pipenv; fi
      pipenv sync
      cd ../frontend
      npm install
  - name: Backend
    command: |
      export PATH="$HOME/.local/bin:$PATH"
      cd backend
      pipenv run python app.py
  - name: Frontend
    command: |
      cd frontend
      BROWSER=none npm start
    openMode: split-right

vscode:
  extensions:
    - ms-python.python
    - ms-python.vscode-pylance
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode